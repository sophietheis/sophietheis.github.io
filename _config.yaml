# site properties and page defaults
title: Sophie THEIS
subtitle: PostDoc in Tim Saunders' lab
description: .
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: sophie.theis@warwick.ac.uk
  orcid: 0000-0003-4206-8153
  google-scholar: https://scholar.google.com/citations?user=nElyMNAAAAAJ&hl=fr&oi=ao
  github: sophietheis
#  twitter: theis_sophie
